<!-- templates/payment_verify.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Payment Verification - Agro Connect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: #f0fdf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #166534;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            font-size: 64px;
            margin: 10px 0;
        }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
        .status-text {
            font-size: 16px;
            margin: 15px 0;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #16a34a;
        }
        .detail-box {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            color: #4b5563;
            text-align: left;
        }
        .detail-box strong {
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌾</div>
        <h1>Agro Connect</h1>
        <p class="subtitle">Payment Verification</p>
        
        <div id="status">
            <div class="spinner"></div>
            <p style="color: #6b7280;">Verifying your payment...</p>
            <p style="font-size: 13px; color: #9ca3af; margin-top: 8px;">Please wait while we confirm your transaction</p>
        </div>
    </div>

    <script>
        // Get reference from URL
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference') || urlParams.get('trxref');
        
        console.log('📝 Reference:', reference);

        const statusDiv = document.getElementById('status');

        if (!reference) {
            statusDiv.innerHTML = `
                <div style="font-size: 48px;">❌</div>
                <h2 class="error">No Reference Found</h2>
                <p class="status-text">Payment reference is missing from the callback.</p>
                <a href="http://localhost:5173/my-applications" class="btn">Go to My Orders</a>
            `;
            return;
        }

        // First check if payment is already verified by checking the API
        const token = localStorage.getItem('token') || '';
        
        // If no token, try to get from URL or use a default
        // The page will still work without token for viewing status

        // Try to check status directly from Django API
        async function checkPaymentStatus() {
            try {
                // First try to check if the transaction exists and its status
                const response = await fetch(`http://127.0.0.1:8000/api/payment/verify/?reference=${reference}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                console.log('📥 Verification Response:', data);
                
                if (data.success) {
                    statusDiv.innerHTML = `
                        <div class="success-icon">✅</div>
                        <h2 class="success">Payment Verified!</h2>
                        <p class="status-text">Your payment of <strong>₦${Number(data.data.amount).toLocaleString()}</strong> has been confirmed.</p>
                        <div class="detail-box">
                            <p><strong>Status:</strong> Funds held in escrow 🔒</p>
                            <p><strong>Reference:</strong> ${reference}</p>
                            <p><strong>Platform Fee:</strong> ₦${Number(data.data.platform_fee || 0).toLocaleString()}</p>
                        </div>
                        <p style="font-size: 14px; color: #6b7280;">The seller will receive the funds after delivery confirmation.</p>
                        <a href="http://localhost:5173/my-applications" class="btn">📦 View My Orders</a>
                    `;
                    return;
                }
                
                // If API says not verified, check manually after 2 seconds
                setTimeout(() => {
                    checkManually();
                }, 2000);
                
            } catch (error) {
                console.error('❌ API Error:', error);
                // Try manual check
                setTimeout(() => {
                    checkManually();
                }, 1000);
            }
        }

        function checkManually() {
            // Try to check by calling a simpler endpoint or just redirect
            fetch(`http://127.0.0.1:8000/api/transactions/`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                // Look for transaction with this reference
                const transactions = data.data || [];
                const found = transactions.find(t => t.reference === reference);
                
                if (found && found.status === 'held') {
                    statusDiv.innerHTML = `
                        <div class="success-icon">✅</div>
                        <h2 class="success">Payment Verified!</h2>
                        <p class="status-text">Your payment of <strong>₦${Number(found.amount).toLocaleString()}</strong> has been confirmed.</p>
                        <div class="detail-box">
                            <p><strong>Status:</strong> Funds held in escrow 🔒</p>
                            <p><strong>Reference:</strong> ${reference}</p>
                        </div>
                        <a href="http://localhost:5173/my-applications" class="btn">📦 View My Orders</a>
                    `;
                } else {
                    // Still not verified, check again
                    setTimeout(() => {
                        checkManually();
                    }, 3000);
                }
            })
            .catch(() => {
                // If error, just redirect to my orders
                setTimeout(() => {
                    window.location.href = 'http://localhost:5173/my-applications';
                }, 5000);
            });
        }

        // Start checking
        checkPaymentStatus();

        // Also check every 5 seconds
        setInterval(() => {
            if (document.querySelector('.spinner')) {
                checkPaymentStatus();
            }
        }, 5000);
    </script>
</body>
</html>
